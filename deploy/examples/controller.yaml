# Example: deploy a controller that auto-registers all Browser CRs in the namespace
apiVersion: livellm.io/v1alpha1
kind: Controller
metadata:
  name: my-controller
  namespace: default
spec:
  # Controller container image (optional, defaults to latest stable)
  # image: kamasalyamov/livellm-browser:controller-2.0.1

  # Number of replicas
  replicas: 1

  # Pod resource limits
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "2Gi"

  # Node.js V8 heap size for the Patchright driver (in MB).
  # Defaults to "3072" (3 GB). Set to "0" to disable.
  # nodeOptions: "3072"

  # Additional environment variables for the controller container.
  # extraEnv:
  #   - name: MY_VAR
  #     value: "my-value"

  # Optional: only register Browser CRs with these labels.
  # If omitted, ALL Running browsers in the same namespace are registered.
  # browserSelector:
  #   tier: scraping

---
# Example: controller that only registers browsers with label tier=scraping
apiVersion: livellm.io/v1alpha1
kind: Controller
metadata:
  name: scraper-controller
  namespace: default
spec:
  browserSelector:
    tier: scraping
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "4Gi"
  nodeOptions: "4096"
