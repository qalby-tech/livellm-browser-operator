apiVersion: apps/v1
kind: Deployment
metadata:
  name: livellm-operator
  namespace: livellm-system
  labels:
    app.kubernetes.io/name: livellm-operator
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: livellm-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: livellm-operator
    spec:
      serviceAccountName: livellm-operator
      containers:
        - name: operator
          image: livellm-browser-operator:latest
          args:
            - --leader-elect=false
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
