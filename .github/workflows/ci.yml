name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: docker.io
  IMAGE_NAME: kamasalyamov/livellm-browser-operator
  CHART_REPO: qalby-tech/livellm-browser-operator-chart

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          if [ -z "$VERSION" ]; then
            echo "VERSION file is empty."
            exit 1
          fi
          if [ "${{ github.ref_name }}" = "develop" ]; then
            TAG="dev-$VERSION"
          else
            TAG="$VERSION"
          fi
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "Computed image tag: $TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-chart:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
    steps:
      - name: Checkout current repository code
        uses: actions/checkout@v4

      - name: Compute chart version
        id: tag
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          if [ -z "$VERSION" ]; then
            echo "VERSION file is empty."
            exit 1
          fi
          if [ "${{ github.ref_name }}" = "develop" ]; then
            TAG="dev-$VERSION"
          else
            TAG="$VERSION"
          fi
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "Computed chart version: $TAG"

      - name: Checkout chart repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CHART_REPO }}
          token: ${{ secrets.CHART_REPO_TOKEN }}
          ref: ${{ github.ref_name }}
          path: chart-repo

      - name: Update Chart.yaml version field
        id: update-chart
        working-directory: chart-repo
        run: |
          NEW_VERSION="${{ steps.tag.outputs.TAG }}"
          CURRENT_VERSION="$(sed -n 's/^version:[[:space:]]*"\{0,1\}\(.*\)"\{0,1\}$/\1/p' Chart.yaml)"

          if [ "$NEW_VERSION" = "$CURRENT_VERSION" ]; then
            echo "Chart version already at $NEW_VERSION. Skipping chart update."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          sed -i "s/^version:.*/version: \"$NEW_VERSION\"/" Chart.yaml

          echo "Updated Chart.yaml:"
          cat Chart.yaml
          echo "updated_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push changes
        if: steps.update-chart.outputs.skip != 'true'
        working-directory: chart-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Chart.yaml
          git commit -m "chore(chart): release ${{ steps.tag.outputs.TAG }}"
          git push origin HEAD:${{ github.ref_name }}
